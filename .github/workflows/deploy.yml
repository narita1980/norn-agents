# Deploy Norn to Azure (Static Web Apps frontend + Container Apps backend).
# See docs/hackathon/AZURE_DEPLOY.md for secrets setup.

name: Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: Deploy frontend (Static Web Apps)
        type: boolean
        default: true
      deploy_backend:
        description: Deploy backend (Container Apps)
        type: boolean
        default: true

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: true

env:
  RESOURCE_GROUP: socrates-code-rg
  LOCATION: japaneast
  ACA_ENV: norn-env
  ACA_APP: norn
  ACR_NAME: socratesnornacr

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - 'Dockerfile'

  deploy-frontend:
    needs: changes
    if: |
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_frontend)
    runs-on: ubuntu-latest
    name: Frontend (Static Web Apps)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SWA token
        id: swa
        env:
          TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::AZURE_STATIC_WEB_APPS_API_TOKEN not set — skipping frontend deploy"
          fi

      - name: Generate SWA config
        if: steps.swa.outputs.skip != 'true'
        env:
          NORN_API_BASE_URL: ${{ secrets.NORN_API_BASE_URL }}
        run: |
          OUTPUT="frontend/staticwebapp.config.json"
          BACKEND="${NORN_API_BASE_URL:-}"
          BACKEND="${BACKEND%/}"

          if [ -z "$BACKEND" ]; then
            jq -n '{
              navigationFallback: {
                rewrite: "/index.html",
                exclude: ["/assets/*", "/*.{css,scss,js,png,gif,ico,jpg,svg,woff,woff2,txt,json,map}"]
              }
            }' > "$OUTPUT"
          else
            jq -n --arg backend "$BACKEND" '{
              routes: [
                {route: "/chat/*", rewrite: ($backend + "/chat/*")},
                {route: "/reviews/*", rewrite: ($backend + "/reviews/*")},
                {route: "/dashboard/*", rewrite: ($backend + "/dashboard/*")},
                {route: "/healthz", rewrite: ($backend + "/healthz")},
                {route: "/readyz", rewrite: ($backend + "/readyz")}
              ],
              navigationFallback: {
                rewrite: "/index.html",
                exclude: [
                  "/chat/*",
                  "/reviews/*",
                  "/dashboard/*",
                  "/healthz",
                  "/readyz",
                  "/assets/*",
                  "/*.{css,scss,js,png,gif,ico,jpg,svg,woff,woff2,txt,json,map}"
                ]
              }
            }' > "$OUTPUT"
          fi

      - name: Setup Bun
        if: steps.swa.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install and build
        if: steps.swa.outputs.skip != 'true'
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          bun install --frozen-lockfile
          bun run build:swa

      - name: Deploy to Azure Static Web Apps
        if: steps.swa.outputs.skip != 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true

  deploy-backend:
    needs: changes
    if: |
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_backend)
    runs-on: ubuntu-latest
    name: Backend (Container Apps)
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Azure credentials
        id: azure
        env:
          CREDS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::AZURE_CREDENTIALS not set — skipping backend deploy"
          fi

      - name: Azure login
        if: steps.azure.outputs.skip != 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps extension
        if: steps.azure.outputs.skip != 'true'
        run: az extension add --name containerapp --upgrade

      - name: Deploy Container App
        if: steps.azure.outputs.skip != 'true'
        env:
          IMAGE_TAG: ${{ github.sha }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          NORN_GITHUB_TOKEN: ${{ secrets.NORN_GITHUB_TOKEN }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          NORN_BASIC_AUTH_USERNAME: ${{ secrets.NORN_BASIC_AUTH_USERNAME }}
          NORN_BASIC_AUTH_PASSWORD: ${{ secrets.NORN_BASIC_AUTH_PASSWORD }}
          NORN_CORS_ORIGINS: ${{ secrets.NORN_CORS_ORIGINS }}
          NORN_APP_BASE_URL: ${{ secrets.NORN_APP_BASE_URL }}
        run: |
          set -euo pipefail

          echo "==> Resource group: $RESOURCE_GROUP ($LOCATION)"
          if ! az group show --name "$RESOURCE_GROUP" &>/dev/null; then
            echo "ERROR: Resource group '$RESOURCE_GROUP' not found."
            echo "Create it in Azure Portal, then scope AZURE_CREDENTIALS to that group."
            exit 1
          fi

          echo "==> Azure Container Registry: $ACR_NAME"
          if ! az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" &>/dev/null; then
            az acr create --resource-group "$RESOURCE_GROUP" --name "$ACR_NAME" --sku Basic --admin-enabled true --output none
          fi

          ACR_LOGIN_SERVER="$(az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --query loginServer -o tsv)"
          IMAGE="$ACR_LOGIN_SERVER/norn:$IMAGE_TAG"

          echo "==> Build & push image: $IMAGE"
          az acr build --registry "$ACR_NAME" --image "norn:$IMAGE_TAG" --file Dockerfile .

          echo "==> Container Apps environment: $ACA_ENV"
          if ! az containerapp env show --name "$ACA_ENV" --resource-group "$RESOURCE_GROUP" &>/dev/null; then
            az containerapp env create \
              --name "$ACA_ENV" \
              --resource-group "$RESOURCE_GROUP" \
              --location "$LOCATION" \
              --output none
          fi

          ACR_USER="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASS="$(az acr credential show --name "$ACR_NAME" --query 'passwords[0].value' -o tsv)"

          if az containerapp show --name "$ACA_APP" --resource-group "$RESOURCE_GROUP" &>/dev/null; then
            echo "==> Update existing Container App: $ACA_APP"
            az containerapp update \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$IMAGE" \
              --output none
          else
            echo "==> Create Container App: $ACA_APP"
            az containerapp create \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$ACA_ENV" \
              --image "$IMAGE" \
              --registry-server "$ACR_LOGIN_SERVER" \
              --registry-username "$ACR_USER" \
              --registry-password "$ACR_PASS" \
              --target-port 8000 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 1 \
              --cpu 1.0 \
              --memory 2.0Gi \
              --env-vars \
                LOG_LEVEL=INFO \
                DATABASE_URL=sqlite+aiosqlite:////data/norn.db \
                NORN_APP_BASE_URL=https://placeholder.example.com \
              --output none
          fi

          FQDN="$(az containerapp show --name "$ACA_APP" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)"
          BACKEND_URL="https://${FQDN}"

          if [ -n "${NORN_APP_BASE_URL:-}" ]; then
            echo "==> Set NORN_APP_BASE_URL=${NORN_APP_BASE_URL} (Static Web Apps URL)"
            az containerapp update \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --set-env-vars "NORN_APP_BASE_URL=${NORN_APP_BASE_URL}" \
              --output none
          else
            echo "::warning::NORN_APP_BASE_URL secret not set — PR コメント内リンク用に SWA URL を登録してください"
          fi

          if [ -n "${AZURE_OPENAI_API_KEY:-}" ] && [ -n "${AZURE_OPENAI_ENDPOINT:-}" ]; then
            echo "==> Configure application secrets"
            DEPLOYMENT="${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1-mini}"

            SECRET_ARGS=("azure-openai-api-key=${AZURE_OPENAI_API_KEY}")
            ENV_ARGS=(
              "AZURE_OPENAI_API_KEY=secretref:azure-openai-api-key"
              "AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}"
              "AZURE_OPENAI_DEPLOYMENT=${DEPLOYMENT}"
            )

            if [ -n "${NORN_GITHUB_TOKEN:-}" ]; then
              SECRET_ARGS+=("github-token=${NORN_GITHUB_TOKEN}")
              ENV_ARGS+=("GITHUB_TOKEN=secretref:github-token")
            fi

            if [ -n "${GITHUB_WEBHOOK_SECRET:-}" ]; then
              SECRET_ARGS+=("github-webhook-secret=${GITHUB_WEBHOOK_SECRET}")
              ENV_ARGS+=("GITHUB_WEBHOOK_SECRET=secretref:github-webhook-secret")
            fi

            if [ -n "${NORN_BASIC_AUTH_USERNAME:-}" ] && [ -n "${NORN_BASIC_AUTH_PASSWORD:-}" ]; then
              SECRET_ARGS+=("basic-auth-password=${NORN_BASIC_AUTH_PASSWORD}")
              ENV_ARGS+=(
                "NORN_BASIC_AUTH_USERNAME=${NORN_BASIC_AUTH_USERNAME}"
                "NORN_BASIC_AUTH_PASSWORD=secretref:basic-auth-password"
              )
            fi

            if [ -n "${NORN_CORS_ORIGINS:-}" ]; then
              ENV_ARGS+=("NORN_CORS_ORIGINS=${NORN_CORS_ORIGINS}")
            fi

            az containerapp secret set \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --secrets "${SECRET_ARGS[@]}" \
              --output none

            az containerapp update \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --set-env-vars "${ENV_ARGS[@]}" \
              --output none
          else
            echo "==> Skipping secret sync (AZURE_OPENAI_API_KEY / AZURE_OPENAI_ENDPOINT not set)"
          fi

          echo "Deployed backend: ${BACKEND_URL}"
          {
            echo "## Backend (Container Apps)"
            echo "- URL: ${BACKEND_URL}"
            echo "- Health: ${BACKEND_URL}/healthz"
            echo "- Webhook: ${BACKEND_URL}/webhook/github"
            echo ""
            echo "GitHub Secret \`NORN_API_BASE_URL\` に上記 URL を設定し、Frontend job を再実行すると SWA から API に接続できます。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Health check
        if: steps.azure.outputs.skip != 'true'
        run: |
          FQDN="$(az containerapp show \
            --name "$ACA_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          echo "Backend URL: https://${FQDN}"
          for i in 1 2 3 4 5 6; do
            if curl -fsS "https://${FQDN}/healthz" | grep -q '"status"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app to become ready (${i}/6)..."
            sleep 15
          done
          echo "Health check failed"
          exit 1
