# Build and deploy Norn to Azure Container Apps.
# See docs/hackathon/AZURE_DEPLOY.md for one-time Azure / GitHub secrets setup.

name: Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/**"
      - "Dockerfile"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: true

env:
  RESOURCE_GROUP: norn-hackathon-rg
  LOCATION: japaneast
  ACA_ENV: norn-env
  ACA_APP: norn
  ACR_NAME: nornhackathon

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Deploy
        env:
          IMAGE_TAG: ${{ github.sha }}
          USE_ACR_BUILD: "1"
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          NORN_GITHUB_TOKEN: ${{ secrets.NORN_GITHUB_TOKEN }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          NORN_BASIC_AUTH_USERNAME: ${{ secrets.NORN_BASIC_AUTH_USERNAME }}
          NORN_BASIC_AUTH_PASSWORD: ${{ secrets.NORN_BASIC_AUTH_PASSWORD }}
          NORN_CORS_ORIGINS: ${{ secrets.NORN_CORS_ORIGINS }}
        run: |
          chmod +x deploy/azure-deploy.sh
          ./deploy/azure-deploy.sh

      - name: Health check
        run: |
          FQDN="$(az containerapp show \
            --name "$ACA_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          echo "App URL: https://${FQDN}"
          for i in 1 2 3 4 5 6; do
            if curl -fsS "https://${FQDN}/healthz" | grep -q '"status"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app to become ready (${i}/6)..."
            sleep 15
          done
          echo "Health check failed"
          exit 1
