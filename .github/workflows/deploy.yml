# Deploy Norn to Azure (Static Web Apps frontend + Container Apps backend).
# See docs/hackathon/AZURE_DEPLOY.md for secrets setup.

name: Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: フロントエンドをデプロイ (Static Web Apps)
        type: boolean
        default: true
      deploy_backend:
        description: バックエンドをデプロイ (Container Apps)
        type: boolean
        default: true

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node.js 20 廃止対応（https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RESOURCE_GROUP: norn-agents-rg
  LOCATION: japaneast
  ACA_ENV: norn-env
  ACA_APP: norn
  ACR_NAME: nornagentsacr

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.targets.outputs.frontend }}
      backend: ${{ steps.targets.outputs.backend }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

      - name: Resolve deploy targets
        id: targets
        env:
          FILTER_FRONTEND: ${{ steps.filter.outputs.frontend }}
          FILTER_BACKEND: ${{ steps.filter.outputs.backend }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "frontend=${{ inputs.deploy_frontend }}" >> "$GITHUB_OUTPUT"
            echo "backend=${{ inputs.deploy_backend }}" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=${FILTER_FRONTEND:-false}" >> "$GITHUB_OUTPUT"
            echo "backend=${FILTER_BACKEND:-false}" >> "$GITHUB_OUTPUT"
          fi
          echo "Deploy frontend: $(grep frontend "$GITHUB_OUTPUT" | cut -d= -f2)"
          echo "Deploy backend: $(grep backend "$GITHUB_OUTPUT" | cut -d= -f2)"

  deploy-frontend:
    needs: resolve
    if: needs.resolve.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    name: Frontend (Static Web Apps)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check SWA token
        id: swa
        env:
          TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          API_BASE: ${{ secrets.NORN_API_BASE_URL }}
          BASIC_USER: ${{ secrets.NORN_BASIC_AUTH_USERNAME }}
          BASIC_PASS: ${{ secrets.NORN_BASIC_AUTH_PASSWORD }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::AZURE_STATIC_WEB_APPS_API_TOKEN が未設定です"
            exit 1
          fi
          if [ -n "$BASIC_USER" ] || [ -n "$BASIC_PASS" ]; then
            if [ -z "$BASIC_USER" ] || [ -z "$BASIC_PASS" ]; then
              echo "::error::Basic 認証は NORN_BASIC_AUTH_USERNAME と NORN_BASIC_AUTH_PASSWORD の両方が必要です"
              exit 1
            fi
            if [ -z "$API_BASE" ]; then
              echo "::error::Basic 認証には NORN_API_BASE_URL（Container Apps の URL）が必要です。Backend job の Summary を参照してください"
              exit 1
            fi
          fi

      - name: Generate SWA config
        run: |
          OUTPUT="frontend/staticwebapp.config.json"
          # SWA の rewrite はアプリ内の相対パスのみ（外部 URL は不可 → 404）。
          # API 接続は VITE_API_BASE_URL ビルド時注入 + バックエンド CORS で行う。
          jq -n '{
            navigationFallback: {
              rewrite: "/index.html",
              exclude: ["/assets/*", "/*.{css,scss,js,mjs,png,gif,ico,jpg,svg,woff,woff2,txt,json,map}"]
            },
            mimeTypes: {
              ".js": "text/javascript",
              ".mjs": "text/javascript"
            }
          }' > "$OUTPUT"
          if jq -e '.. | strings | select(test("^https?://"))' "$OUTPUT" >/dev/null; then
            echo "::error::staticwebapp.config.json must not contain external URLs in rewrite"
            exit 1
          fi
          echo "staticwebapp.config.json:"
          cat "$OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          NORN_API_BASE_URL: ${{ secrets.NORN_API_BASE_URL }}
        run: |
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-${NORN_API_BASE_URL:-}}"
          VITE_API_BASE_URL="${VITE_API_BASE_URL%/}"
          echo "VITE_API_BASE_URL=${VITE_API_BASE_URL:-<same-origin>}"
          bun install --frozen-lockfile
          VITE_API_BASE_URL="$VITE_API_BASE_URL" bun run build:swa

      - name: Prepare artifact
        run: |
          cp frontend/staticwebapp.config.json frontend/dist/staticwebapp.config.json
          if grep -q 'src/main.tsx' frontend/dist/index.html; then
            echo "::error::dist/index.html is not a production build"
            exit 1
          fi
          echo "Built index.html:"
          head -12 frontend/dist/index.html

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          config_file_location: frontend/dist
          skip_app_build: true

  deploy-backend:
    needs: resolve
    if: needs.resolve.outputs.backend == 'true'
    runs-on: ubuntu-latest
    name: Backend (Container Apps)
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Azure credentials
        id: azure
        env:
          CREDS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "::error::AZURE_CREDENTIALS が未設定です"
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Deploy Container App
        env:
          IMAGE_TAG: ${{ github.sha }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          NORN_GITHUB_TOKEN: ${{ secrets.NORN_GITHUB_TOKEN }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          NORN_BASIC_AUTH_USERNAME: ${{ secrets.NORN_BASIC_AUTH_USERNAME }}
          NORN_BASIC_AUTH_PASSWORD: ${{ secrets.NORN_BASIC_AUTH_PASSWORD }}
          NORN_CORS_ORIGINS: ${{ secrets.NORN_CORS_ORIGINS }}
          NORN_APP_BASE_URL: ${{ secrets.NORN_APP_BASE_URL }}
        run: |
          set -euo pipefail

          echo "==> Resource group: $RESOURCE_GROUP ($LOCATION)"
          if ! az group show --name "$RESOURCE_GROUP" &>/dev/null; then
            echo "ERROR: Resource group '$RESOURCE_GROUP' not found."
            echo "Create it in Azure Portal, then scope AZURE_CREDENTIALS to that group."
            exit 1
          fi

          echo "==> Azure Container Registry: $ACR_NAME"
          if ! az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" &>/dev/null; then
            az acr create --resource-group "$RESOURCE_GROUP" --name "$ACR_NAME" --sku Basic --admin-enabled true --output none
          fi

          ACR_LOGIN_SERVER="$(az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --query loginServer -o tsv)"
          IMAGE="$ACR_LOGIN_SERVER/norn:$IMAGE_TAG"

          echo "==> Build & push image: $IMAGE"
          az acr build --registry "$ACR_NAME" --image "norn:$IMAGE_TAG" --file backend/Dockerfile backend

          echo "==> Container Apps environment: $ACA_ENV"
          if ! az containerapp env show --name "$ACA_ENV" --resource-group "$RESOURCE_GROUP" &>/dev/null; then
            az containerapp env create \
              --name "$ACA_ENV" \
              --resource-group "$RESOURCE_GROUP" \
              --location "$LOCATION" \
              --output none
          fi

          ACR_USER="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASS="$(az acr credential show --name "$ACR_NAME" --query 'passwords[0].value' -o tsv)"

          if az containerapp show --name "$ACA_APP" --resource-group "$RESOURCE_GROUP" &>/dev/null; then
            echo "==> Update existing Container App: $ACA_APP"
            az containerapp update \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$IMAGE" \
              --output none
          else
            echo "==> Create Container App: $ACA_APP"
            az containerapp create \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$ACA_ENV" \
              --image "$IMAGE" \
              --registry-server "$ACR_LOGIN_SERVER" \
              --registry-username "$ACR_USER" \
              --registry-password "$ACR_PASS" \
              --target-port 8000 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 1 \
              --cpu 1.0 \
              --memory 2.0Gi \
              --env-vars \
                LOG_LEVEL=INFO \
                DATABASE_URL=sqlite+aiosqlite:////data/norn.db \
                NORN_APP_BASE_URL=https://placeholder.example.com \
              --output none
          fi

          FQDN="$(az containerapp show --name "$ACA_APP" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)"
          BACKEND_URL="https://${FQDN}"

          if [ -n "${NORN_APP_BASE_URL:-}" ]; then
            echo "==> Set NORN_APP_BASE_URL=${NORN_APP_BASE_URL} (Static Web Apps URL)"
            az containerapp update \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --set-env-vars "NORN_APP_BASE_URL=${NORN_APP_BASE_URL}" \
              --output none
          else
            echo "::warning::NORN_APP_BASE_URL secret not set — PR コメント内リンク用に SWA URL を登録してください"
          fi

          if [ -n "${NORN_BASIC_AUTH_USERNAME:-}" ] && [ -n "${NORN_BASIC_AUTH_PASSWORD:-}" ]; then
            echo "==> Configure Basic Auth"
            az containerapp secret set \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --secrets "basic-auth-password=${NORN_BASIC_AUTH_PASSWORD}" \
              --output none
            az containerapp update \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --set-env-vars \
                "NORN_BASIC_AUTH_USERNAME=${NORN_BASIC_AUTH_USERNAME}" \
                "NORN_BASIC_AUTH_PASSWORD=secretref:basic-auth-password" \
              --output none
          else
            echo "==> Basic Auth not configured (NORN_BASIC_AUTH_USERNAME / PASSWORD not set)"
          fi

          if [ -n "${NORN_CORS_ORIGINS:-}" ]; then
            echo "==> Set NORN_CORS_ORIGINS for cross-origin SWA access"
            az containerapp update \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --set-env-vars "NORN_CORS_ORIGINS=${NORN_CORS_ORIGINS}" \
              --output none
          else
            echo "::warning::NORN_CORS_ORIGINS secret not set — SWA から API 呼び出し時に CORS エラーになります"
          fi

          if [ -n "${AZURE_OPENAI_API_KEY:-}" ] && [ -n "${AZURE_OPENAI_ENDPOINT:-}" ]; then
            echo "==> Configure application secrets"
            DEPLOYMENT="${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1-mini}"

            SECRET_ARGS=("azure-openai-api-key=${AZURE_OPENAI_API_KEY}")
            ENV_ARGS=(
              "AZURE_OPENAI_API_KEY=secretref:azure-openai-api-key"
              "AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}"
              "AZURE_OPENAI_DEPLOYMENT=${DEPLOYMENT}"
            )

            if [ -n "${NORN_GITHUB_TOKEN:-}" ]; then
              SECRET_ARGS+=("github-token=${NORN_GITHUB_TOKEN}")
              ENV_ARGS+=("GITHUB_TOKEN=secretref:github-token")
            fi

            if [ -n "${GITHUB_WEBHOOK_SECRET:-}" ]; then
              SECRET_ARGS+=("github-webhook-secret=${GITHUB_WEBHOOK_SECRET}")
              ENV_ARGS+=("GITHUB_WEBHOOK_SECRET=secretref:github-webhook-secret")
            fi

            az containerapp secret set \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --secrets "${SECRET_ARGS[@]}" \
              --output none

            az containerapp update \
              --name "$ACA_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --set-env-vars "${ENV_ARGS[@]}" \
              --output none
          else
            echo "==> Skipping OpenAI/GitHub secret sync (AZURE_OPENAI_API_KEY / AZURE_OPENAI_ENDPOINT not set)"
          fi

          echo "Deployed backend: ${BACKEND_URL}"
          {
            echo "## Backend (Container Apps)"
            echo "- URL: ${BACKEND_URL}"
            echo "- Health: ${BACKEND_URL}/healthz"
            echo "- Webhook: ${BACKEND_URL}/webhook/github"
            echo ""
            echo "**GitHub Secret \`NORN_API_BASE_URL\` に \`${BACKEND_URL}\` を登録**し、\`NORN_CORS_ORIGINS\` に SWA URL を設定して Frontend job を再実行してください。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Health check
        run: |
          FQDN="$(az containerapp show \
            --name "$ACA_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          echo "Backend URL: https://${FQDN}"
          for i in 1 2 3 4 5 6; do
            if curl -fsS "https://${FQDN}/healthz" | grep -q '"status"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app to become ready (${i}/6)..."
            sleep 15
          done
          echo "Health check failed"
          exit 1
