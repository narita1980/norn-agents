<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norn — 3女神コードレビュー</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Norn</h1>
        <p class="subtitle">3女神があなたのコードに伴走します</p>
    </header>
    <main>
        <ul id="messages" aria-live="polite"></ul>
        <form id="composer">
            <textarea
                id="input"
                placeholder="メッセージを入力してください..."
                rows="3"
                required
            ></textarea>
            <button type="submit">送信</button>
        </form>
        <p class="hint">スレッドID: <span id="thread-id">（新規）</span></p>
    </main>
    <script src="/chat.js"></script>
</body>
</html>
